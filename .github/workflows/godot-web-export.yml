name: "Godot Web Export"

on:
  push:
    tags:
      - 'v*'  # This will trigger on any tag that starts with 'v', like v1.0.0

jobs:
  export_web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:3.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          lfs: true
      
      - name: Setup
        run: |
          mkdir -p ~/.local/share/godot/templates
          mv /root/.local/share/godot/templates/* ~/.local/share/godot/templates
          
      - name: Web Build
        run: |
          mkdir -p build/web
          cd game
          godot --export "HTML5" ../build/web/index.html
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: web
          path: build/web
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: build/web
